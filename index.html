<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ مفاجأة ليكي ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

<div id="hearts"></div>

<div class="container">

<div id="start">

<h1>❤️ عندي مفاجأة ليكي ❤️</h1>

<p>
متختاريش لاااا خااالص هموتك 
</p>

<button id="startBtn">
ابدئي ❤️
</button>

</div>

<div id="game" style="display:none;">

<h2 id="question">
بتحبيني؟ 🥺❤️
</h2>

<div class="buttons">

<button id="yes">
أيوة ❤️
</button>

<button id="no">
لا 🙄
</button>

</div>

</div>

<div id="final" style="display:none;">

<h1>
❤️🥹
</h1>

<h2>

من أول يوم عرفتك وأنا بقيت مبسوط بوجودك في حياتي.

كل ضحكة منك بتفرحني.

وكل دقيقة معاكي بالنسبالي أحلى من أي حاجة.

أتمنى أفضل جنبك دايمًا.

بحبك أوي ❤️

</h2>

<button id="giftBtn">

🎁 افتحي الهدية

</button>

</div>

<div id="gift" style="display:none;">

<div class="giftBox">

❤️

</div>

<h1>

I Love You Forever ❤️

</h1>

</div>

</div>

<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>
</html>
